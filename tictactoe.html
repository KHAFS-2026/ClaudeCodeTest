<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a8dadc;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
      color: #a8dadc;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      min-width: 80px;
    }

    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: 700;
      color: #eee;
    }

    .score-box.x-score { border-color: #e94560; }
    .score-box.x-score .label { color: #e94560; }
    .score-box.o-score { border-color: #a8dadc; }
    .score-box.o-score .label { color: #a8dadc; }
    .score-box.tie-score .label { color: #888; }

    button {
      margin-top: 1.8rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #c73652; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="score">
    <div class="score-box x-score">
      <div class="label">X</div>
      <span id="score-x">0</span>
    </div>
    <div class="score-box tie-score">
      <div class="label">Ties</div>
      <span id="score-tie">0</span>
    </div>
    <div class="score-box o-score">
      <div class="label">O</div>
      <span id="score-o">0</span>
    </div>
  </div>
  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver;
    let scores = { X: 0, O: 0, tie: 0 };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const cells = [];

    function init() {
      boardEl.innerHTML = '';
      cells.length = 0;
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      statusEl.textContent = "X's turn";

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
        cells.push(cell);
      }
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('win'));
        statusEl.textContent = `${current} wins!`;
        scores[current]++;
        updateScore();
        gameOver = true;
      } else if (board.every(Boolean)) {
        statusEl.textContent = "It's a tie!";
        scores.tie++;
        updateScore();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.textContent = `${current}'s turn`;
      }
    }

    function checkWin() {
      for (const combo of WINS) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return combo;
      }
      return null;
    }

    function updateScore() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-tie').textContent = scores.tie;
    }

    document.getElementById('restart').addEventListener('click', init);
    init();
  </script>
</body>
</html>
